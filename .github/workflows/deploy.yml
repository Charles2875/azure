name: Build and Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Image
        run: |
          docker build \
            -t ${{ secrets.DOCKER_USERNAME }}/devops-flask-app:${{ github.sha }} \
            -t ${{ secrets.DOCKER_USERNAME }}/devops-flask-app:latest .

      - name: Push Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/devops-flask-app:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/devops-flask-app:latest

      - name: Deploy To Azure VM
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            cd ~/Devops
            docker-compose pull
            docker-compose up -d