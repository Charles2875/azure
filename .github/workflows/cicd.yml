name: Build and Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Image
        run: |
          docker build \
            -t ${{ secrets.DOCKER_USERNAME }}/devops-flask-app:${{ github.sha }} \
            -t ${{ secrets.DOCKER_USERNAME }}/devops-flask-app:latest .

      - name: Push Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/devops-flask-app:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/devops-flask-app:latest

      - name: Deploy to Azure VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AZURE_VM_IP }}
          username: ${{ secrets.AZURE_VM_USER }}
          key: ${{ secrets.AZURE_SSH_KEY }}
          script: |
            cd ~/Devops
            git pull origin main
            export APP1_IMAGE_TAG=${{ github.sha }}
            export APP2_IMAGE_TAG=latest
            docker compose pull flask-app-1
            docker compose up -d --no-deps flask-app-1
            echo "flask-app-1 updated to ${{ github.sha }}"
            docker compose ps